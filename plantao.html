<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Pro - Estável</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* Garante que o scroll seja suave e não trave */
        #kanban-view { scroll-behavior: smooth; min-height: 400px; }
        .card-hover:hover { transform: translateY(-2px); transition: all 0.2s; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 antialiased">
    <div class="p-4 max-w-[1400px] mx-auto">
        
        <div class="flex flex-wrap items-center justify-between mb-6 bg-white p-4 rounded-2xl shadow-sm border border-gray-200 gap-4">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="calendar-range" class="text-blue-600"></i> Sistema de Escala
                </h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="switchView('kanban')" class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-sm font-medium flex items-center gap-2 transition">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Kanban
                </button>
                <button onclick="switchView('table')" class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-sm font-medium flex items-center gap-2 transition">
                    <i data-lucide="table" class="w-4 h-4"></i> Tabela
                </button>
                <button onclick="addDate()" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 transition flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> Data
                </button>
                <button onclick="exportPDF()" class="px-4 py-2 rounded-lg bg-red-500 text-white text-sm font-medium hover:bg-red-600 transition flex items-center gap-2">
                    <i data-lucide="download" class="w-4 h-4"></i> PDF
                </button>
                <button onclick="resetSystem()" class="p-2 text-gray-400 hover:text-red-500 transition" title="Resetar tudo">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <div id="kanban-view" class="flex gap-4 overflow-x-auto pb-6"></div>

        <div id="table-view" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left border-collapse text-sm">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="p-4 font-semibold">Cor</th>
                        <th class="p-4 font-semibold">Nome</th>
                        <th class="p-4 font-semibold">Cargo</th>
                        <th class="p-4 font-semibold">Data</th>
                        <th class="p-4 font-semibold">Ação</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Configurações
        const paleta = {
            'azul': 'bg-blue-100 text-blue-700 border-blue-200',
            'verde': 'bg-green-100 text-green-700 border-green-200',
            'roxo': 'bg-purple-100 text-purple-700 border-purple-200',
            'rosa': 'bg-pink-100 text-pink-700 border-pink-200',
            'laranja': 'bg-orange-100 text-orange-700 border-orange-200'
        };

        // Estado
        let funcionarios = JSON.parse(localStorage.getItem('f_data')) || [];
        let datas = JSON.parse(localStorage.getItem('d_data')) || [];

        function save() {
            localStorage.setItem('f_data', JSON.stringify(funcionarios));
            localStorage.setItem('d_data', JSON.stringify(datas));
        }

        function resetSystem() {
            if(confirm('Isso apagará TODOS os dados. Deseja continuar?')) {
                localStorage.clear();
                location.reload();
            }
        }

        function formatData(dataStr) {
            try {
                const date = new Date(dataStr + 'T12:00:00');
                const sem = date.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '');
                const dia = date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }).replace('.', '');
                return `${sem}, ${dia}`.toLowerCase();
            } catch(e) { return dataStr; }
        }

        function addDate() {
            const d = prompt("Nova data (AAAA-MM-DD):", new Date().toISOString().split('T')[0]);
            if(d && !datas.includes(d)) {
                datas.push(d);
                datas.sort();
                save();
                render();
            }
        }

        function addFunc(data) {
            const nome = prompt("Nome:");
            const cargo = prompt("Cargo:", "Plantão");
            const cor = prompt("Cor (azul, verde, roxo, rosa, laranja):", "azul");
            if(nome) {
                funcionarios.push({ id: Date.now(), nome, cargo, data, cor: cor.toLowerCase() });
                save();
                render();
            }
        }

        function editFunc(id) {
            const f = funcionarios.find(x => x.id === id);
            const n = prompt("Nome:", f.nome);
            if(n) f.nome = n;
            save();
            render();
        }

        function delFunc(id) {
            funcionarios = funcionarios.filter(x => x.id !== id);
            save();
            render();
        }

        function render() {
            const kanban = document.getElementById('kanban-view');
            const tableBody = document.getElementById('table-body');

            // Render Kanban
            kanban.innerHTML = datas.length ? datas.map(d => `
                <div class="min-w-[260px] max-w-[260px] flex-shrink-0">
                    <div class="flex justify-between items-center mb-3 px-1">
                        <span class="font-bold text-gray-600 text-xs uppercase tracking-widest">${formatData(d)}</span>
                        <button onclick="datas=datas.filter(x=>x!=='${d}');save();render();" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                    </div>
                    <div class="space-y-2">
                        ${funcionarios.filter(f => f.data === d).map(f => `
                            <div onclick="editFunc(${f.id})" class="p-3 rounded-xl border border-transparent shadow-sm cursor-pointer card-hover ${paleta[f.cor] || paleta.azul}">
                                <div class="flex justify-between items-start">
                                    <span class="font-bold text-sm leading-tight">${f.nome}</span>
                                    <button onclick="event.stopPropagation();delFunc(${f.id})" class="opacity-30 hover:opacity-100"><i data-lucide="x" class="w-3 h-3"></i></button>
                                </div>
                                <div class="text-[10px] font-black uppercase mt-1 opacity-60">${f.
