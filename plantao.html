<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Escala Simples</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-7xl mx-auto">
        <div class="flex gap-4 mb-6 bg-white p-4 rounded shadow">
            <button onclick="window.addDate()" class="bg-blue-600 text-white px-4 py-2 rounded"> + Adicionar Data </button>
            <button onclick="document.getElementById('kanban').style.display='flex'; document.getElementById('tabela').style.display='none'" class="border px-4 py-2 rounded"> Kanban </button>
            <button onclick="document.getElementById('kanban').style.display='none'; document.getElementById('tabela').style.display='block'" class="border px-4 py-2 rounded"> Tabela </button>
            <button onclick="localStorage.clear(); location.reload();" class="text-red-500 text-xs"> Limpar Tudo </button>
        </div>

        <div id="kanban" class="flex gap-4 overflow-x-auto"></div>

        <div id="tabela" class="hidden bg-white rounded shadow p-4">
            <table class="w-full border-collapse">
                <thead><tr class="border-b"><th>Nome</th><th>Cargo</th><th>Data</th></tr></thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Dados e Cores
        let dados = JSON.parse(localStorage.getItem('escala_v1')) || [];
        let datas = JSON.parse(localStorage.getItem('datas_v1')) || [];
        const cores = {
            azul: 'bg-blue-100 text-blue-800 border-blue-300',
            verde: 'bg-green-100 text-green-800 border-green-300',
            amarelo: 'bg-yellow-100 text-yellow-800 border-yellow-300',
            rosa: 'bg-pink-100 text-pink-800 border-pink-300'
        };

        window.addDate = function() {
            const d = prompt("Digite a data (ex: 2026-03-05):");
            if(d) {
                if(!datas.includes(d)) datas.push(d);
                datas.sort();
                save();
            }
        };

        window.addFunc = function(data) {
            const nome = prompt("Nome do Funcionário:");
            const cargo = prompt("Turno/Cargo:");
            const cor = prompt("Cor (azul, verde, amarelo, rosa):", "azul");
            if(nome) {
                dados.push({ id: Date.now(), nome, cargo, data, cor });
                save();
            }
        };

        window.remover = function(id) {
            dados = dados.filter(x => x.id !== id);
            save();
        };

        function save() {
            localStorage.setItem('escala_v1', JSON.stringify(dados));
            localStorage.setItem('datas_v1', JSON.stringify(datas));
            render();
        }

        function formatarData(str) {
            const d = new Date(str + 'T12:00:00');
            const dias = ['dom', 'seg', 'ter', 'qua', 'qui', 'sex', 'sab'];
            const meses = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
            return dias[d.getDay()] + ', ' + d.getDate() + '/' + meses[d.getMonth()];
        }

        function render() {
            // Render Kanban
            const kanban = document.getElementById('kanban');
            kanban.innerHTML = datas.map(d => `
                <div class="min-w-[250px] bg-gray-200 p-3 rounded-lg">
                    <div class="font-bold mb-3 flex justify-between uppercase text-xs">
                        ${formatarData(d)}
                        <button onclick="datas=datas.filter(x=>x!=='${d}');save();" class="text-red-400">X</button>
                    </div>
                    <div class="space-y-2">
                        ${dados.filter(f => f.data === d).map(f => `
                            <div class="p-3 rounded border shadow-sm relative ${cores[f.cor] || cores.azul}">
                                <button onclick="remover(${f.id})" class="absolute top-1 right-1 text-xs opacity-50">x</button>
                                <div class="font-bold text-sm">${f.nome}</div>
                                <div class="text-[10px] uppercase font-bold opacity-70">${f.cargo}</div>
                            </div>
                        `).join('')}
                        <button onclick="addFunc('${d}')" class="w-full py-1 border-2 border-dashed border-gray-400 text-gray-500 rounded text-xs">+ Adicionar</button>
                    </div>
                </div>
            `).join('');

            // Render Tabela
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = dados.map(f => `
                <tr class="border-b">
                    <td class="p-2">${f.nome}</td>
                    <td class="p-2">${f.cargo}</td>
                    <td class="p-2">${f.data}</td>
                </tr>
            `).join('');
        }

        render();
    </script>
</body>
</html>
