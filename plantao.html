<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Pro + PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen">
    <div id="app" class="p-6 max-w-[1600px] mx-auto">
        
        <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Escala de Plantão</h1>
                <p class="text-slate-500">Gestão visual com exportação para PDF</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 bg-white p-2 rounded-2xl shadow-sm border">
                <button onclick="switchView('kanban')" id="btn-kanban" class="flex items-center px-4 py-2 rounded-xl bg-blue-600 text-white transition shadow-md">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 mr-2"></i> Kanban
                </button>
                <button onclick="switchView('table')" id="btn-table" class="flex items-center px-4 py-2 rounded-xl text-slate-600 hover:bg-slate-50 transition">
                    <i data-lucide="table" class="w-4 h-4 mr-2"></i> Tabela
                </button>
                <div class="w-[1px] h-6 bg-slate-200 mx-1"></div>
                <button onclick="addDate()" class="flex items-center px-4 py-2 rounded-xl bg-amber-500 text-white hover:bg-amber-600 transition">
                    <i data-lucide="calendar-plus" class="w-4 h-4 mr-2"></i> + Dia
                </button>
                <button onclick="exportPDF()" class="flex items-center px-4 py-2 rounded-xl bg-red-500 text-white hover:bg-red-600 transition">
                    <i data-lucide="file-text" class="w-4 h-4 mr-2"></i> Baixar PDF
                </button>
            </div>
        </div>

        <div id="kanban-view" class="flex gap-6 overflow-x-auto pb-6 items-start"></div>

        <div id="table-view" class="hidden bg-white rounded-2xl shadow-xl border overflow-hidden">
            <table id="tabela-escala" class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 border-b border-slate-200 text-slate-700 uppercase text-xs tracking-widest">
                        <th class="p-4 font-bold">Cor</th>
                        <th class="p-4 font-bold">Funcionário</th>
                        <th class="p-4 font-bold">Cargo</th>
                        <th class="p-4 font-bold">Data</th>
                        <th class="p-4 font-bold text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Cores suaves para os funcionários
        const cores = ['bg-blue-100 text-blue-700 border-blue-200', 'bg-emerald-100 text-emerald-700 border-emerald-200', 
                       'bg-purple-100 text-purple-700 border-purple-200', 'bg-rose-100 text-rose-700 border-rose-200', 
                       'bg-amber-100 text-amber-700 border-amber-200', 'bg-indigo-100 text-indigo-700 border-indigo-200'];

        // Carregar dados salvos ou iniciar novos
        let funcionarios = JSON.parse(localStorage.getItem('plantonistas')) || [];
        let colunasDatas = JSON.parse(localStorage.getItem('datas')) || [new Date().toISOString().split('T')[0]];

        function saveData() {
            localStorage.setItem('plantonistas', JSON.stringify(funcionarios));
            localStorage.setItem('datas', JSON.stringify(colunasDatas));
        }

        // Atribuir cor baseada no ID ou Nome
        function getCor(id) {
            return cores[id % cores.length];
        }

        function addDate() {
            const ultima = new Date(colunasDatas[colunasDatas.length - 1]);
            ultima.setDate(ultima.getDate() + 1);
            colunasDatas.push(ultima.toISOString().split('T')[0]);
            saveData();
            render();
        }

        function removeDate(data) {
            if(confirm('Apagar este dia?')) {
                colunasDatas = colunasDatas.filter(d => d !== data);
                funcionarios = funcionarios.filter(f => f.data !== data);
                saveData();
                render();
            }
        }

        function addFuncionario(data) {
            const nome = prompt("Nome do funcionário:");
            const cargo = prompt("Cargo (Ex: Diurno, Noturno):");
            if(nome) {
                funcionarios.push({ id: Date.now(), nome, cargo: cargo || 'Geral', data });
                saveData();
                render();
            }
        }

        function deleteFunc(id) {
            funcionarios = funcionarios.filter(f => f.id !== id);
            saveData();
            render();
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Escala de Trabalho", 14, 15);
            
            const rows = funcionarios.map(f => [f.nome, f.cargo, f.data]);
            doc.autoTable({
                head: [['Funcionário', 'Cargo', 'Data']],
                body: rows,
                startY: 20,
                theme: 'grid'
            });
            doc.save(`escala_${new Date().toLocaleDateString()}.pdf`);
        }

        function render() {
            const kanban = document.getElementById('kanban-view');
            const tableBody = document.getElementById('table-body');

            kanban.innerHTML = colunasDatas.map(data => `
                <div class="min-w-[300px] bg-slate-200/50 rounded-2xl p-4 border border-slate-200">
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-bold text-slate-600 uppercase text-xs tracking-tighter">
                            ${new Date(data).toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: 'short' })}
                        </span>
                        <button onclick="removeDate('${data}')" class="text-slate-400 hover:text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button>
                    </div>
                    <div class="space-y-3">
                        ${funcionarios.filter(f => f.data === data).map(f => `
                            <div class="p-3 rounded-xl border shadow-sm transition-transform hover:scale-[1.02] ${getCor(f.id)}">
                                <div class="flex justify-between">
                                    <p class="font-bold text-sm">${f.nome}</p>
                                    <button onclick="deleteFunc(${f.id})"><i data-lucide="minus-circle" class="w-3 h-3"></i></button>
                                </div>
                                <p class="text-[10px] uppercase opacity-70 font-black mt-1">${f.cargo}</p>
                            </div>
                        `).join('')}
                        <button onclick="addFuncionario('${data}')" class="w-full py-2 border-2 border-dashed border-slate-300 rounded-xl text-slate-400 hover:bg-white text-xs font-bold">+ Adicionar</button>
                    </div>
                </div>
            `).join('');

            tableBody.innerHTML = funcionarios.map(f => `
                <tr class="border-b border-slate-100">
                    <td class="p-4"><div class="w-3 h-3 rounded-full ${getCor(f.id).split(' ')[0]}"></div></td>
                    <td class="p-4 font-bold text-slate-800">${f.nome}</td>
                    <td class="p-4 text-slate-500">${f.cargo}</td>
                    <td class="p-4 text-slate-500">${f.data}</td>
                    <td class="p-4 text-center"><button onclick="deleteFunc(${f.id})" class="text-red-400"><i data-lucide="trash-2" class="w-4 h-4 inline"></i></button></td>
                </tr>
            `).join('');

            lucide.createIcons();
        }

        function switchView(view) {
            const kView = document.getElementById('kanban-view');
            const tView = document.getElementById('table-view');
            const btnK = document.getElementById('btn-kanban');
            const btnT = document.getElementById('btn-table');

            if(view === 'kanban') {
                kView.classList.remove('hidden'); tView.classList.add('hidden');
                btnK.className = "flex items-center px-4 py-2 rounded-xl bg-blue-600 text-white shadow-md transition";
                btnT.className = "flex items-center px-4 py-2 rounded-xl text-slate-600 hover:bg-slate-50 transition";
            } else {
                kView.classList.add('hidden'); tView.classList.remove('hidden');
                btnT.className = "flex items-center px-4 py-2 rounded-xl bg-blue-600 text-white shadow-md transition";
                btnK.className = "flex items-center px-4 py-2 rounded-xl text-slate-600 hover:bg-slate-50 transition";
            }
        }

        render();
    </script>
</body>
</html>
