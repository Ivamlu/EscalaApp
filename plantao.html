<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Pro Dinâmica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">
    <div id="app" class="p-6 max-w-[1600px] mx-auto">
        
        <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800">Escala de Funcionários</h1>
                <p class="text-slate-500">Adicione datas e gerencie sua equipe em tempo real.</p>
            </div>
            
            <div class="flex items-center gap-3 bg-white p-2 rounded-2xl shadow-sm border">
                <button onclick="switchView('kanban')" id="btn-kanban" class="flex items-center px-4 py-2 rounded-xl bg-blue-600 text-white transition shadow-md">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 mr-2"></i> Kanban
                </button>
                <button onclick="switchView('table')" id="btn-table" class="flex items-center px-4 py-2 rounded-xl text-slate-600 hover:bg-slate-50 transition">
                    <i data-lucide="table" class="w-4 h-4 mr-2"></i> Tabela
                </button>
                <div class="w-[1px] h-6 bg-slate-200 mx-1"></div>
                <button onclick="addDate()" class="flex items-center px-4 py-2 rounded-xl bg-emerald-500 text-white hover:bg-emerald-600 transition shadow-md">
                    <i data-lucide="calendar-plus" class="w-4 h-4 mr-2"></i> Nova Data
                </button>
            </div>
        </div>

        <div id="kanban-view" class="flex gap-6 overflow-x-auto pb-6 items-start">
            </div>

        <div id="table-view" class="hidden bg-white rounded-2xl shadow-lg border overflow-hidden transition-all">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200">
                        <th class="p-4 font-bold text-slate-700">Funcionário</th>
                        <th class="p-4 font-bold text-slate-700">Cargo</th>
                        <th class="p-4 font-bold text-slate-700">Data</th>
                        <th class="p-4 font-bold text-slate-700 text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // ESTADO INICIAL
        let funcionarios = [
            { id: Date.now(), nome: "Exemplo Nome", cargo: "Gerente", data: new Date().toISOString().split('T')[0] }
        ];
        let colunasDatas = [new Date().toISOString().split('T')[0]];

        // FUNÇÕES DE MANIPULAÇÃO
        function addDate() {
            const ultimaData = new Date(colunasDatas[colunasDatas.length - 1]);
            ultimaData.setDate(ultimaData.getDate() + 1);
            const novaDataStr = ultimaData.toISOString().split('T')[0];
            colunasDatas.push(novaDataStr);
            render();
        }

        function removeDate(dataStr) {
            if(confirm('Remover este dia da escala?')) {
                colunasDatas = colunasDatas.filter(d => d !== dataStr);
                funcionarios = funcionarios.filter(f => f.data !== dataStr);
                render();
            }
        }

        function addFuncionario(dataStr) {
            const nome = prompt("Nome do funcionário:");
            const cargo = prompt("Cargo:");
            if(nome && cargo) {
                funcionarios.push({ id: Date.now(), nome, cargo, data: dataStr });
                render();
            }
        }

        function deleteFuncionario(id) {
            funcionarios = funcionarios.filter(f => f.id !== id);
            render();
        }

        // RENDERIZAÇÃO
        function render() {
            const kanban = document.getElementById('kanban-view');
            const tableBody = document.getElementById('table-body');

            // Render Kanban
            kanban.innerHTML = colunasDatas.map(data => `
                <div class="min-w-[320px] bg-slate-200/40 rounded-3xl p-5 border border-slate-200 backdrop-blur-sm">
                    <div class="flex justify-between items-center mb-5">
                        <div>
                            <h3 class="font-black text-slate-800 uppercase tracking-wider text-sm">
                                ${new Date(data).toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: 'short' })}
                            </h3>
                        </div>
                        <button onclick="removeDate('${data}')" class="text-slate-400 hover:text-red-500 transition">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>

                    <div class="space-y-4">
                        ${funcionarios.filter(f => f.data === data).map(f => `
                            <div class="group bg-white p-4 rounded-2xl shadow-sm border border-transparent hover:border-blue-300 transition-all duration-300 relative">
                                <button onclick="deleteFuncionario(${f.id})" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition">
                                    <i data-lucide="x-circle" class="w-4 h-4"></i>
                                </button>
                                <p class="font-bold text-slate-800">${f.nome}</p>
                                <p class="text-xs text-slate-400 font-medium">${f.cargo.toUpperCase()}</p>
                            </div>
                        `).join('')}
                        
                        <button onclick="addFuncionario('${data}')" class="w-full py-3 border-2 border-dashed border-slate-300 rounded-2xl text-slate-400 hover:border-blue-400 hover:text-blue-500 hover:bg-blue-50 transition-all flex items-center justify-center font-bold text-sm">
                            <i data-lucide="plus" class="w-4 h-4 mr-2"></i> Adicionar
                        </button>
                    </div>
                </div>
            `).join('');

            // Render Tabela
            tableBody.innerHTML = funcionarios.map(f => `
                <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                    <td class="p-4 font-semibold text-slate-800">${f.nome}</td>
                    <td class="p-4 text-slate-500 text-sm">${f.cargo}</td>
                    <td class="p-4 text-slate-500 text-sm font-mono">${f.data}</td>
                    <td class="p-4 text-center">
                        <button onclick="deleteFuncionario(${f.id})" class="text-red-400 hover:text-red-600 transition p-2">
                            <i data-lucide="trash-2" class="w-4 h-4 inline"></i>
                        </button>
                    </td>
                </tr>
            `).join('');

            lucide.createIcons();
        }

        // ALTERNAR VISÃO
        function switchView(view) {
            const kView = document.getElementById('kanban-view');
            const tView = document.getElementById('table-view');
            const btnK = document.getElementById('btn-kanban');
            const btnT = document.getElementById('btn-table');

            if(view === 'kanban') {
                kView.classList.remove('hidden');
                tView.classList.add('hidden');
                btnK.className = "flex items-center px-4 py-2 rounded-xl bg-blue-600 text-white transition shadow-md";
                btnT.className = "flex items-center px-4 py-2 rounded-xl text-slate-600 hover:bg-slate-50 transition";
            } else {
                kView.classList.add('hidden');
                tView.classList.remove('hidden');
                btnT.className = "flex items-center px-4 py-2 rounded-xl bg-blue-600 text-white transition shadow-md";
                btnK.className = "flex items-center px-4 py-2 rounded-xl text-slate-600 hover:bg-slate-50 transition";
            }
        }

        // Iniciar
        render();
    </script>
</body>
</html>
