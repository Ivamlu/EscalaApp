<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala de Plantão Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div id="app" class="p-8">
        <div class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Escala de Plantão</h1>
                <p class="text-gray-500">Gestão visual de funcionários e datas</p>
            </div>
            <div class="flex bg-white rounded-xl shadow-sm border p-1.5 gap-2">
                <button onclick="switchView('kanban')" id="btn-kanban" class="flex items-center px-4 py-2 rounded-lg bg-blue-100 text-blue-600 transition">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 mr-2"></i> Kanban
                </button>
                <button onclick="switchView('table')" id="btn-table" class="flex items-center px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition">
                    <i data-lucide="table" class="w-4 h-4 mr-2"></i> Tabela
                </button>
            </div>
        </div>

        <div id="kanban-view" class="flex gap-6 overflow-x-auto pb-6">
            </div>

        <div id="table-view" class="hidden bg-white rounded-2xl shadow-sm border overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4 font-semibold text-gray-600">Funcionário</th>
                        <th class="p-4 font-semibold text-gray-600">Cargo</th>
                        <th class="p-4 font-semibold text-gray-600">Data</th>
                        <th class="p-4 font-semibold text-gray-600">Turno</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const plantonistas = [
            { id: 1, nome: "João Silva", cargo: "Médico", data: "2026-03-05", turno: "Diurno" },
            { id: 2, nome: "Ana Costa", cargo: "Enfermeira", data: "2026-03-05", turno: "Noturno" },
            { id: 3, nome: "Carlos Souza", cargo: "Técnico", data: "2026-03-06", turno: "Diurno" },
            { id: 4, nome: "Beatriz Luz", cargo: "Médica", data: "2026-03-07", turno: "Plantão 24h" }
        ];

        const datas = ["2026-03-05", "2026-03-06", "2026-03-07"];

        function render() {
            // Render Kanban
            const kanban = document.getElementById('kanban-view');
            kanban.innerHTML = datas.map(data => `
                <div class="min-w-[320px] bg-gray-200/50 rounded-2xl p-4 border border-gray-200">
                    <h3 class="font-bold text-gray-700 mb-4 flex justify-between items-center px-1">
                        ${new Date(data).toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'short' })}
                        <span class="text-xs bg-gray-300 px-2 py-0.5 rounded-full">${plantonistas.filter(p => p.data === data).length}</span>
                    </h3>
                    <div class="space-y-3">
                        ${plantonistas.filter(p => p.data === data).map(p => `
                            <div class="bg-white p-4 rounded-xl shadow-sm border-b-2 border-blue-500 cursor-pointer hover:shadow-md transition">
                                <p class="font-bold text-gray-800">${p.nome}</p>
                                <p class="text-xs text-gray-500 mb-2">${p.cargo}</p>
                                <div class="flex items-center text-xs font-medium text-blue-600">
                                    <i data-lucide="clock" class="w-3 h-3 mr-1"></i> ${p.turno}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            // Render Table
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = plantonistas.map(p => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="p-4 font-medium text-gray-800">${p.nome}</td>
                    <td class="p-4 text-gray-600 text-sm">${p.cargo}</td>
                    <td class="p-4 text-gray-600 text-sm">${p.data}</td>
                    <td class="p-4"><span class="bg-blue-50 text-blue-700 px-2 py-1 rounded-md text-xs font-bold">${p.turno}</span></td>
                </tr>
            `).join('');
            
            lucide.createIcons();
        }

        function switchView(view) {
            const kView = document.getElementById('kanban-view');
            const tView = document.getElementById('table-view');
            const btnK = document.getElementById('btn-kanban');
            const btnT = document.getElementById('btn-table');

            if(view === 'kanban') {
                kView.classList.remove('hidden');
                tView.classList.add('hidden');
                btnK.className = "flex items-center px-4 py-2 rounded-lg bg-blue-100 text-blue-600 transition";
                btnT.className = "flex items-center px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition";
            } else {
                kView.classList.add('hidden');
                tView.classList.remove('hidden');
                btnT.className = "flex items-center px-4 py-2 rounded-lg bg-blue-100 text-blue-600 transition";
                btnK.className = "flex items-center px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition";
            }
        }

        render();
    </script>
</body>
</html>
