<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Pro - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        .kanban-column { min-height: 450px; transition: all 0.2s; }
        .drag-over { background-color: rgba(59, 130, 246, 0.05); border: 2px dashed #3b82f6 !important; }
        /* Scrollbar personalizada para ficar mais bonito */
        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 p-4 font-sans text-slate-800">

    <div class="max-w-[1600px] mx-auto">
        <div class="flex flex-wrap items-center justify-between mb-8 bg-white p-5 rounded-2xl shadow-sm border border-slate-200 gap-4">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">Escala de Trabalho</h1>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Gestão de Plantão</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <div class="flex bg-slate-100 p-1 rounded-xl mr-2">
                    <button onclick="switchView('kanban')" id="tab-kanban" class="px-4 py-2 rounded-lg text-sm font-bold bg-white shadow-sm transition">Kanban</button>
                    <button onclick="switchView('table')" id="tab-table" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-800 transition">Tabela</button>
                </div>
                <button onclick="addDate()" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition inline-flex items-center">
                    + Nova Data
                </button>
                <button onclick="exportPDF()" class="px-5 py-2.5 bg-rose-500 text-white rounded-xl text-sm font-bold hover:bg-rose-600 shadow-lg shadow-rose-100 transition">
                    PDF
                </button>
            </div>
        </div>

        <div id="kanban-view" class="flex gap-6 overflow-x-auto pb-8 items-start"></div>

        <div id="table-view" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-[10px] tracking-[0.2em]">
                        <th class="p-5 font-black">Funcionário</th>
                        <th class="p-5 font-black">Cargo/Turno</th>
                        <th class="p-5 font-black">Data do Plantão</th>
                        <th class="p-5 font-black text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>

    <script>
        let funcionarios = JSON.parse(localStorage.getItem('escala_vfinal')) || [];
        let colunas = JSON.parse(localStorage.getItem('datas_vfinal')) || [];

        function save() {
            // Ordenar datas antes de salvar
            colunas.sort();
            localStorage.setItem('escala_vfinal', JSON.stringify(funcionarios));
            localStorage.setItem('datas_vfinal', JSON.stringify(colunas));
            render();
        }

        function formatarDataUser(dataStr) {
            if(!dataStr) return "";
            const data = new Date(dataStr + 'T12:00:00');
            const diaMes = data.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
            const diaSemana = data.toLocaleDateString('pt-BR', { weekday: 'long' });
            return `${diaMes} ${diaSemana}`;
        }

        window.addDate = function() {
            const d = prompt("Digite a data (AAAA-MM-DD):", new Date().toISOString().split('T')[0]);
            if (d && !colunas.includes(d)) {
                colunas.push(d);
                save();
            }
        };

        window.addFunc = function(data) {
            const nome = prompt("Nome completo:");
            const cargo = prompt("Cargo ou Turno (ex: Noturno):");
            if (nome) {
                funcionarios.push({ id: Date.now().toString(), nome, cargo: cargo || "Geral", data });
                save();
            }
        };

        // Drag & Drop
        window.onDragStart = (e, id) => e.dataTransfer.setData("text", id);
        window.onDragOver = (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
        window.onDragLeave = (e) => e.currentTarget.classList.remove('drag-over');
        window.onDrop = (e, novaData) => {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const id = e.dataTransfer.getData("text");
            const f = funcionarios.find(x => x.id === id);
            if(f) { f.data = novaData; save(); }
        };

        function render() {
            const kanban = document.getElementById('kanban-view');
            const tableBody = document.getElementById('table-body');

            // Render Kanban
            kanban.innerHTML = colunas.map(data => `
                <div class="min-w-[300px] bg-slate-100/50 border border-slate-200 rounded-3xl p-4 kanban-column"
                     ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event, '${data}')">
                    <div class="flex justify-between items-center mb-5 px-1">
                        <span class="text-[11px] font-black uppercase tracking-widest text-slate-500 bg-white px-3 py-1.5 rounded-full shadow-sm border border-slate-100">
                            ${formatarDataUser(data)}
                        </span>
                        <button onclick="if(confirm('Apagar dia?')){colunas=colunas.filter(d=>d!=='${data}');save();}" class="text-slate-300 hover:text-red-500 transition">×</button>
                    </div>
                    <div class="space-y-3">
                        ${funcionarios.filter(f => f.data === data).map(f => `
                            <div draggable="true" ondragstart="onDragStart(event, '${f.id}')" 
                                 class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 cursor-grab active:cursor-grabbing hover:border-blue-400 transition-all">
                                <p class="font-bold text-slate-800 text-sm">${f.nome}</p>
                                <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-wider">${f.cargo}</p>
                                <div class="mt-3 pt-3 border-t border-slate-50 flex justify-end">
                                    <button onclick="funcionarios=funcionarios.filter(x=>x.id!=='${f.id}');save();" class="text-[9px] font-black text-slate-300 hover:text-red-500 uppercase tracking-tighter">Excluir</button>
                                </div>
                            </div>
                        `).join('')}
                        <button onclick="addFunc('${data}')" class="w-full py-3 border-2 border-dashed border-slate-200 rounded-2xl text-slate-300 text-[10px] font-black hover:border-blue-300 hover:text-blue-500 hover:bg-white transition-all uppercase tracking-widest">+ Adicionar</button>
                    </div>
                </div>
            `).join('');

            // Ordenar funcionários para a Tabela por Data
            const funcionariosOrdenados = [...funcionarios].sort((a, b) => a.data.localeCompare(b.data));

            tableBody.innerHTML = funcionariosOrdenados.length ? funcionariosOrdenados.map(f => `
                <tr class="hover:bg-slate-50 transition group">
                    <td class="p-5 text-sm font-bold text-slate-700">${f.nome}</td>
                    <td class="p-5 text-sm text-slate-500">${f.cargo}</td>
                    <td class="p-5">
                        <span class="px-4 py-1.5 bg-blue-50 text-blue-600 rounded-xl text-xs font-bold border border-blue-100 inline-block">
                            ${formatarDataUser(f.data)}
                        </span>
                    </td>
                    <td class="p-5 text-center">
                        <button onclick="funcionarios=funcionarios.filter(x=>x.id!=='${f.id}');save();" class="text-slate-300 hover:text-red-500 font-bold text-xs uppercase tracking-tighter transition-colors">
                            Remover
                        </button>
                    </td>
                </tr>
            `).join('') : `<tr><td colspan="4" class="p-10 text-center text-slate-400 text-sm font-medium">Nenhum funcionário escalado.</td></tr>`;
        }

        window.switchView = (v) => {
            document.getElementById('kanban-view').classList.toggle('hidden', v !== 'kanban');
            document.getElementById('table-view').classList.toggle('hidden', v !== 'table');
            
            // Estilo das abas
            document.getElementById('tab-kanban').className = v === 'kanban' ? 'px-4 py-2 rounded-lg text-sm font-bold bg-white shadow-sm transition' : 'px-4 py-2 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-800 transition';
            document.getElementById('tab-table').className = v === 'table' ? 'px-4 py-2 rounded-lg text-sm font-bold bg-white shadow-sm transition' : 'px-4 py-2 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-800 transition';
        };

        window.exportPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18);
            doc.text("Relatório de Escala", 14, 20);
            
            const funcionariosOrdenados = [...funcionarios].sort((a, b) => a.data.localeCompare(b.data));

            doc.autoTable({
                head: [['Funcionário', 'Cargo/Turno', 'Data do Plantão']],
                body: funcionariosOrdenados.map(f => [f.nome, f.cargo, formatarDataUser(f.data)]),
                startY: 30,
                headStyles: { fillColor: [51, 65, 85], fontStyle: 'bold' },
                alternateRowStyles: { fillColor: [248, 250, 252] }
            });
            doc.save("escala-plantao.pdf");
        };

        render();
    </script>
</body>
</html>
