<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Pro - Kanban & Tabela</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        .kanban-column { min-height: 300px; transition: background 0.2s; }
        .drag-over { background-color: rgba(59, 130, 246, 0.1) !important; border: 2px dashed #3b82f6 !important; }
        .card { cursor: grab; }
        .card:active { cursor: grabbing; }
    </style>
</head>
<body class="bg-gray-50 p-4 font-sans text-gray-800">

    <div class="max-w-[1600px] mx-auto">
        <div class="flex flex-wrap items-center justify-between mb-8 bg-white p-4 rounded-xl shadow-sm border gap-4">
            <h1 class="text-xl font-bold border-r pr-4 mr-2">Escala de Plantão</h1>
            
            <div class="flex items-center gap-2">
                <button onclick="switchView('kanban')" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium transition">Kanban</button>
                <button onclick="switchView('table')" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium transition">Tabela</button>
                <button onclick="addDate()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition">+ Adicionar Data</button>
                <button onclick="exportPDF()" class="px-4 py-2 bg-red-500 text-white rounded-lg text-sm font-medium hover:bg-red-600 transition">Baixar PDF</button>
            </div>
        </div>

        <div id="kanban-view" class="flex gap-4 overflow-x-auto pb-6"></div>

        <div id="table-view" class="hidden bg-white rounded-xl shadow-sm border overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4 font-semibold text-sm">Funcionário</th>
                        <th class="p-4 font-semibold text-sm">Cargo/Turno</th>
                        <th class="p-4 font-semibold text-sm">Data</th>
                        <th class="p-4 font-semibold text-sm">Ações</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Estado inicial
        let funcionarios = JSON.parse(localStorage.getItem('escala_v3')) || [];
        let colunas = JSON.parse(localStorage.getItem('datas_v3')) || [];

        function save() {
            localStorage.setItem('escala_v3', JSON.stringify(funcionarios));
            localStorage.setItem('datas_v3', JSON.stringify(colunas));
            render();
        }

        // Formatação da Data (ex: 03/03 sexta-feira)
        function formatarDataLonga(dataStr) {
            const data = new Date(dataStr + 'T12:00:00');
            const diaMes = data.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
            const diaSemana = data.toLocaleDateString('pt-BR', { weekday: 'long' });
            return `${diaMes} ${diaSemana}`;
        }

        // Adicionar Data
        window.addDate = function() {
            const d = prompt("Digite a data (AAAA-MM-DD):", "2026-03-05");
            if (d && !colunas.includes(d)) {
                colunas.push(d);
                colunas.sort();
                save();
            }
        };

        // Adicionar Funcionário
        window.addFunc = function(data) {
            const nome = prompt("Nome do Funcionário:");
            const cargo = prompt("Cargo ou Turno:");
            if (nome) {
                funcionarios.push({ id: Date.now().toString(), nome, cargo, data });
                save();
            }
        };

        // Lógica de Arrastar (Drag and Drop)
        function onDragStart(event, id) {
            event.dataTransfer.setData("text/plain", id);
        }

        function onDragOver(event) {
            event.preventDefault();
            event.currentTarget.classList.add('drag-over');
        }

        function onDragLeave(event) {
            event.currentTarget.classList.remove('drag-over');
        }

        function onDrop(event, novaData) {
            event.preventDefault();
            event.currentTarget.classList.remove('drag-over');
            const id = event.dataTransfer.getData("text/plain");
            const func = funcionarios.find(f => f.id === id);
            if (func) {
                func.data = novaData;
                save();
            }
        }

        // Renderização
        function render() {
            const kanban = document.getElementById('kanban-view');
            const tableBody = document.getElementById('table-body');

            // Render Kanban
            kanban.innerHTML = colunas.map(data => `
                <div class="min-w-[280px] bg-gray-200/50 border border-gray-200 rounded-xl p-3 kanban-column"
                     ondragover="onDragOver(event)" 
                     ondragleave="onDragLeave(event)" 
                     ondrop="onDrop(event, '${data}')">
                    <div class="flex justify-between items-center mb-4 px-1 text-gray-600">
                        <span class="text-xs font-bold uppercase tracking-wider">${formatarDataLonga(data)}</span>
                        <button onclick="colunas=colunas.filter(d=>d!=='${data}');save();" class="text-gray-400 hover:text-red-500">×</button>
                    </div>
                    <div class="space-y-2">
                        ${funcionarios.filter(f => f.data === data).map(f => `
                            <div draggable="true" ondragstart="onDragStart(event, '${f.id}')" 
                                 class="card bg-white p-3 rounded-lg shadow-sm border hover:shadow-md transition">
                                <p class="font-bold text-sm mb-1">${f.nome}</p>
                                <p class="text-[10px] text-gray-400 uppercase font-black">${f.cargo || '---'}</p>
                                <button onclick="funcionarios=funcionarios.filter(x=>x.id!=='${f.id}');save();" class="mt-2 text-[10px] text-red-300 hover:text-red-500 font-bold">REMOVER</button>
                            </div>
                        `).join('')}
                        <button onclick="addFunc('${data}')" class="w-full py-2 border-2 border-dashed border-gray-300 rounded-lg text-gray-400 text-xs font-bold hover:bg-white transition">+ ADICIONAR</button>
                    </div>
                </div>
            `).join('');

            // Render Tabela
            tableBody.innerHTML = funcionarios.map(f => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="p-4 font-bold text-sm text-gray-700">${f.nome}</td>
                    <td class="p-4 text-sm text-gray-500">${f.cargo}</td>
                    <td class="p-4 text-sm text-gray-500">${f.data}</td>
                    <td class="p-4"><button onclick="funcionarios=funcionarios.filter(x=>x.id!=='${f.id}');save();" class="text-red-400 text-sm">Excluir</button></td>
                </tr>
            `).join('');
        }

        // Alternar Visão
        window.switchView = function(view) {
            document.getElementById('kanban-view').className = view === 'kanban' ? 'flex gap-4 overflow-x-auto pb-6' : 'hidden';
            document.getElementById('table-view').className = view === 'table' ? 'bg-white rounded-xl shadow-sm border overflow-hidden' : 'hidden';
        }

        // Exportar PDF
        window.exportPDF = function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Escala de Plantão", 14, 15);
            doc.autoTable({
                head: [['Nome', 'Cargo', 'Data']],
                body: funcionarios.map(f => [f.nome, f.cargo, f.data]),
                startY: 20
            });
            doc.save("escala.pdf");
        }

        render();
    </script>
</body>
</html>
