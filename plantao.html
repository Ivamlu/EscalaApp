<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Pro - Personalizada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen">
    <div id="app" class="p-6 max-w-[1600px] mx-auto">
        
        <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Escala de Plantão</h1>
                <p class="text-slate-500 text-sm">Clique nos cards ou na tabela para editar as informações.</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 bg-white p-2 rounded-2xl shadow-sm border">
                <button onclick="switchView('kanban')" id="btn-kanban" class="flex items-center px-4 py-2 rounded-xl bg-blue-600 text-white shadow-md transition">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 mr-2"></i> Kanban
                </button>
                <button onclick="switchView('table')" id="btn-table" class="flex items-center px-4 py-2 rounded-xl text-slate-600 hover:bg-slate-50 transition">
                    <i data-lucide="table" class="w-4 h-4 mr-2"></i> Tabela
                </button>
                <div class="w-[1px] h-6 bg-slate-200 mx-1"></div>
                <button onclick="addDate()" class="bg-amber-500 text-white px-4 py-2 rounded-xl hover:bg-amber-600 transition flex items-center">
                    <i data-lucide="calendar-plus" class="w-4 h-4 mr-2"></i> + Dia
                </button>
                <button onclick="exportPDF()" class="bg-red-500 text-white px-4 py-2 rounded-xl hover:bg-red-600 transition flex items-center">
                    <i data-lucide="file-text" class="w-4 h-4 mr-2"></i> PDF
                </button>
            </div>
        </div>

        <div id="kanban-view" class="flex gap-6 overflow-x-auto pb-6 items-start"></div>

        <div id="table-view" class="hidden bg-white rounded-2xl shadow-xl border overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 border-b border-slate-200 text-slate-700 uppercase text-[10px] tracking-widest">
                        <th class="p-4 font-bold">Cor</th>
                        <th class="p-4 font-bold">Funcionário</th>
                        <th class="p-4 font-bold">Cargo/Turno</th>
                        <th class="p-4 font-bold">
